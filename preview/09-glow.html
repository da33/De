<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.box{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;text-transform:uppercase;letter-spacing:.2em;color:#0a0a0a}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--fg-3);margin-top:8px;text-align:center}
</style></head><body>
<div><div class="box" style="background:#ff3c00;box-shadow:0 0 32px rgba(255,60,0,0.5);color:#f5f4f0">FLARE</div><div class="lbl">--glow-flare</div></div>
<div><div class="box" style="background:#d8ff3c;box-shadow:0 0 32px rgba(216,255,60,0.5)">ACID</div><div class="lbl">--glow-acid</div></div>
<div><div class="box" style="background:#ff2d7b;box-shadow:0 0 32px rgba(255,45,123,0.5);color:#f5f4f0">HOT</div><div class="lbl">--glow-hot</div></div>
</body></html>
