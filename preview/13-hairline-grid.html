<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:0;font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--stroke)}
.cell{background:var(--ink);padding:20px;min-height:140px}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.t{font-size:15px;font-weight:700;color:var(--paper);margin-bottom:8px;font-family:var(--font-tc)}
.d{font-size:12px;color:var(--fg-3);line-height:1.7}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="tag">造型師</div><div class="t">金馬頒獎典禮後台</div><div class="d">第60屆金馬獎整體造型團隊</div></div>
  <div class="cell"><div class="tag">創業</div><div class="t">開自己的工作室</div><div class="d">美甲、美睫、紋繡，畢業就能執業</div></div>
  <div class="cell"><div class="tag">藝人</div><div class="t">上舞台、發音樂</div><div class="d">2025 學生音樂上架串流平台</div></div>
</div>
</body></html>
