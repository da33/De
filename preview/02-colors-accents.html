<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);font-family:var(--font-body);padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;padding:12px;border:1px solid var(--stroke)}
.n{font-family:var(--font-mono);font-size:11px;font-weight:700}
.v{font-family:var(--font-mono);font-size:10px;opacity:.65;text-transform:uppercase}
</style></head><body>
<div class="sw" style="background:#ff3c00"><span class="n">flare</span><span class="v">#ff3c00</span></div>
<div class="sw" style="background:#d8ff3c;color:#0a0a0a"><span class="n">acid</span><span class="v">#d8ff3c</span></div>
<div class="sw" style="background:#ff2d7b"><span class="n">hot</span><span class="v">#ff2d7b</span></div>
<div class="sw" style="background:#7b2dff"><span class="n">ultra</span><span class="v">#7b2dff</span></div>
<div class="sw" style="background:#00f0ff;color:#0a0a0a"><span class="n">cyan</span><span class="v">#00f0ff</span></div>
<div class="sw" style="background:#c9a84c;color:#0a0a0a"><span class="n">gold</span><span class="v">#c9a84c</span></div>
</body></html>
