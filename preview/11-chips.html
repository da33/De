<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:24px;display:flex;flex-wrap:wrap;gap:8px;font-family:var(--font-body)}
.chip{font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--stroke);color:var(--fg-2)}
.on{border-color:var(--paper);color:var(--paper)}
.acc{border-color:var(--flare);color:var(--flare)}
.filled{background:var(--paper);color:var(--ink);border-color:var(--paper)}
</style></head><body>
<span class="chip">Dance</span>
<span class="chip on">Hip-Hop</span>
<span class="chip">Choreography</span>
<span class="chip acc">編舞</span>
<span class="chip filled">現代舞</span>
<span class="chip">Ableton Live</span>
<span class="chip">After Effects</span>
<span class="chip">舞蹈藝術</span>
<span class="chip">自媒體</span>
<span class="chip on">國際合作</span>
</body></html>
