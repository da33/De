<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);font-family:var(--font-body);padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;padding:12px;border:1px solid var(--stroke)}
.sw .n{font-family:var(--font-mono);font-size:10px;opacity:.7}
.sw .v{font-family:var(--font-mono);font-size:10px;opacity:.45;text-transform:uppercase}
</style></head><body>
<div class="sw" style="background:#0a0a0a"><span class="n">ink</span><span class="v">#0a0a0a</span></div>
<div class="sw" style="background:#151515"><span class="n">ink-2</span><span class="v">#151515</span></div>
<div class="sw" style="background:#1f1f1f"><span class="n">ink-3</span><span class="v">#1f1f1f</span></div>
<div class="sw" style="background:#d9d4c5;color:#0a0a0a"><span class="n">bone</span><span class="v">#d9d4c5</span></div>
<div class="sw" style="background:#ebe8df;color:#0a0a0a"><span class="n">paper-2</span><span class="v">#ebe8df</span></div>
<div class="sw" style="background:#f5f4f0;color:#0a0a0a"><span class="n">paper</span><span class="v">#f5f4f0</span></div>
</body></html>
