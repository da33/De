<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:28px;display:flex;flex-direction:column;gap:16px;font-family:var(--font-body);align-items:flex-start}
.btn{font-family:var(--font-body);font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:14px 28px;border:1px solid var(--paper);cursor:pointer;text-decoration:none;display:inline-block;transition:all .24s}
.primary{background:var(--paper);color:var(--ink)}
.outline{background:transparent;color:var(--paper)}
.flare{background:var(--flare);color:var(--paper);border-color:var(--flare)}
.ghost{background:transparent;color:var(--paper);border-color:var(--stroke)}
</style></head><body>
<a class="btn primary">Contact Me →</a>
<a class="btn outline">View Expertise</a>
<a class="btn flare">Start Project</a>
<a class="btn ghost">[ Ghost ]</a>
</body></html>
