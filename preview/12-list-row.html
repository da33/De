<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:0;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:60px 1fr 1fr 120px;gap:16px;align-items:center;padding:18px 24px;border-bottom:1px solid var(--stroke);transition:padding .3s}

.title{font-size:16px;font-weight:500;color:var(--paper)}
.place{font-size:13px;color:var(--fg-3)}
.year{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.2em;text-align:right}
</style></head><body>
<div class="row"><span class="num">01</span><span class="title">專任講師</span><span class="place">萬能科技大學 時尚造型設計系</span><span class="year">2024 — Now</span></div>
<div class="row"><span class="num">02</span><span class="title">創辦人 · 校長</span><span class="place">踢踢兒童街舞培訓中心</span><span class="year">2023 — Now</span></div>
<div class="row"><span class="num">03</span><span class="title">職業舞者 · 編舞師</span><span class="place">Dance Soul · 靈動力</span><span class="year">2002 — 2012</span></div>
</body></html>
