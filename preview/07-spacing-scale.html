<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:24px;font-family:var(--font-body)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar{height:24px;background:var(--flare)}
.n{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.2em;width:60px}
.v{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-left:auto}
</style></head><body>
<div class="row"><span class="n">sp-1</span><div class="bar" style="width:4px"></div><span class="v">4px</span></div>
<div class="row"><span class="n">sp-2</span><div class="bar" style="width:8px"></div><span class="v">8px</span></div>
<div class="row"><span class="n">sp-3</span><div class="bar" style="width:12px"></div><span class="v">12px</span></div>
<div class="row"><span class="n">sp-4</span><div class="bar" style="width:16px"></div><span class="v">16px</span></div>
<div class="row"><span class="n">sp-5</span><div class="bar" style="width:24px"></div><span class="v">24px</span></div>
<div class="row"><span class="n">sp-6</span><div class="bar" style="width:32px"></div><span class="v">32px</span></div>
<div class="row"><span class="n">sp-7</span><div class="bar" style="width:48px"></div><span class="v">48px</span></div>
<div class="row"><span class="n">sp-8</span><div class="bar" style="width:64px"></div><span class="v">64px</span></div>
<div class="row"><span class="n">sp-9</span><div class="bar" style="width:96px"></div><span class="v">96px</span></div>
</body></html>
