<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);font-family:var(--font-body);padding:28px;display:flex;align-items:center;gap:28px}
.lockup{font-family:var(--font-display);font-size:48px;text-transform:uppercase;letter-spacing:-.01em;line-height:.9}
.stack{font-family:var(--font-display);font-size:28px;text-transform:uppercase;letter-spacing:.05em;line-height:1}
.stack small{font-family:var(--font-body);font-size:11px;letter-spacing:.35em;color:var(--fg-3);font-weight:500;display:block;margin-top:8px}
.div{width:1px;height:100px;background:var(--stroke)}
.badge{display:inline-block;padding:6px 10px;border:1px solid var(--flare);color:var(--flare);font-size:10px;letter-spacing:.3em;font-family:var(--font-body);text-transform:uppercase}
</style></head><body>
<div class="lockup">LIN<br>YU-FAN</div>
<div class="div"></div>
<div class="stack">林祐凡<small>.VNU</small></div>
<div class="div"></div>
<div><span class="badge">◈ STAGE BY RINO</span></div>
</body></html>
