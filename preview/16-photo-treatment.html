<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:0;font-family:var(--font-body)}
.wrap{position:relative;width:100%;height:380px;overflow:hidden}
.wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.wrap::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.72)}
.inner{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:28px}
.label{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--flare);margin-bottom:10px}
.h{font-family:var(--font-display);font-size:64px;line-height:.9;text-transform:uppercase;letter-spacing:-.02em}
</style></head><body>
<div class="wrap">
  <img src="../assets/dance.jpg" alt="">
  <div class="inner">
    <div class="label">◈ 時尚造型設計暨表演藝術系</div>
    <div class="h">Stage<br>is where<br>we <span style="color:transparent;-webkit-text-stroke:1px rgba(245,244,240,0.6)">live</span></div>
  </div>
</div>
</body></html>
