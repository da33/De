<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{aspect-ratio:1.3;border:1px solid var(--stroke);display:flex;flex-direction:column;justify-content:space-between;padding:14px}
.n{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.2em}
.v{font-family:var(--font-mono);font-size:11px;color:var(--paper)}
.sh{width:56px;height:56px;background:var(--paper);margin:0 auto}
</style></head><body>
<div class="card"><div class="n">r-0 (default)</div><div class="sh" style="border-radius:0"></div><div class="v">0px · sharp</div></div>
<div class="card"><div class="n">r-1</div><div class="sh" style="border-radius:2px"></div><div class="v">2px</div></div>
<div class="card"><div class="n">r-2</div><div class="sh" style="border-radius:6px"></div><div class="v">6px</div></div>
<div class="card"><div class="n">r-pill</div><div class="sh" style="border-radius:999px"></div><div class="v">999px</div></div>
</body></html>
