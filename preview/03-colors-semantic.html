<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--ink);color:var(--paper);font-family:var(--font-body);padding:0}
.row{display:grid;grid-template-columns:160px 1fr;align-items:center;padding:10px 24px;border-bottom:1px solid var(--stroke)}
.row:last-child{border-bottom:0}
.n{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.15em}
.s{display:flex;align-items:baseline;gap:12px}
</style></head><body>
<div class="row"><span class="n">--fg</span><span class="s" style="color:#f5f4f0"><span style="font-family:var(--font-display);font-size:24px;text-transform:uppercase">Primary text</span><span class="n">rgba(245,244,240,1)</span></span></div>
<div class="row"><span class="n">--fg-2</span><span class="s" style="color:rgba(245,244,240,0.65)"><span style="font-family:var(--font-body);font-size:18px">Secondary body</span><span class="n">0.65</span></span></div>
<div class="row"><span class="n">--fg-3</span><span class="s" style="color:rgba(245,244,240,0.35)"><span style="font-family:var(--font-body);font-size:18px">Meta · muted</span><span class="n">0.35</span></span></div>
<div class="row"><span class="n">--fg-4</span><span class="s" style="color:rgba(245,244,240,0.15)"><span style="font-family:var(--font-body);font-size:18px">Disabled · faint</span><span class="n">0.15</span></span></div>
<div class="row"><span class="n">--accent</span><span class="s"><span style="font-family:var(--font-display);font-size:24px;color:#ff3c00;text-transform:uppercase">ACCENT · FLARE</span><span class="n">#ff3c00</span></span></div>
</body></html>
